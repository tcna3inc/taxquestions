<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2025 Tax Questionnaire</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #1a1a1a; }
  .app { max-width: 600px; margin: 0 auto; padding: 1rem; }
  .header { text-align: center; padding: 2rem 0 1.5rem; border-bottom: 1px solid #e0e0e0; margin-bottom: 1.5rem; }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header p { font-size: 14px; color: #666; margin-top: 6px; }
  .client-fields { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }
  .client-fields input { width: 100%; font-size: 16px; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; }
  .client-fields input:focus { border-color: #1D9E75; box-shadow: 0 0 0 3px rgba(29,158,117,0.12); }
  .progress-bar-wrap { position: sticky; top: 0; background: #f5f5f5; padding: 10px 0; z-index: 10; border-bottom: 1px solid #e0e0e0; margin-bottom: 1rem; }
  .progress-label { font-size: 12px; color: #888; margin-bottom: 6px; display: flex; justify-content: space-between; }
  .progress-track { height: 5px; background: #e0e0e0; border-radius: 3px; }
  .progress-fill { height: 5px; background: #1D9E75; border-radius: 3px; transition: width 0.3s; }
  .section { margin-bottom: 1.5rem; background: #fff; border-radius: 12px; border: 1px solid #e8e8e8; overflow: hidden; }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: #fafafa; border-bottom: 1px solid #f0f0f0; gap: 12px; }
  .section-title { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.07em; }
  .section-all-btns { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
  .section-all-label { font-size: 11px; color: #aaa; margin-right: 2px; }
  .section-all-btns button { height: 28px; padding: 0 10px; border: 1px solid #ddd; border-radius: 6px; background: #fff; color: #888; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.12s; white-space: nowrap; }
  .section-all-btns button.all-yes { background: #EAF3DE; border-color: #639922; color: #3B6D11; }
  .section-all-btns button.all-no { background: #FCEBEB; border-color: #E24B4A; color: #A32D2D; }
  .section-all-btns button:active { transform: scale(0.95); }
  .question { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #f5f5f5; }
  .question:last-child { border-bottom: none; }
  .question.sub { background: #fafafa; padding-left: 28px; }
  .q-text { font-size: 14px; color: #1a1a1a; line-height: 1.5; flex: 1; }
  .q-note { font-size: 12px; color: #999; margin-top: 4px; }
  .yn-btns { display: flex; gap: 6px; flex-shrink: 0; margin-top: 1px; }
  .yn-btns button { width: 48px; height: 34px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #888; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.12s; }
  .yn-btns button:active { transform: scale(0.95); }
  .yn-btns button.yes.active { background: #EAF3DE; border-color: #639922; color: #3B6D11; font-weight: 600; }
  .yn-btns button.no.active { background: #FCEBEB; border-color: #E24B4A; color: #A32D2D; font-weight: 600; }
  .submit-btn { width: 100%; padding: 16px; background: #1a1a1a; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; color: #fff; cursor: pointer; margin-top: 1rem; margin-bottom: 3rem; letter-spacing: 0.01em; }
  .submit-btn:hover { background: #333; }
  .submit-btn:active { transform: scale(0.98); }
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
</style>
</head>
<body>
<div class="app">
  <h1 class="sr-only">2025 Tax Questionnaire</h1>

  <div class="header">
    <h1>2025 Tax questionnaire</h1>
    <p>Please answer all questions below. Tap Yes or No for each item.</p>
  </div>

  <div class="client-fields">
    <input type="text" id="client-name" placeholder="Your full name" autocomplete="name" />
    <input type="text" id="client-ssn" placeholder="Last 4 of SSN (optional)" inputmode="numeric" maxlength="4" />
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span>Progress</span>
      <span id="prog-text">0 of 84 answered</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div id="questions-container"></div>

  <button class="submit-btn" onclick="submitForm()">Submit via email →</button>
</div>

<script>
const SECTIONS = [
  { title: "Personal information", questions: [
    { id:"p1", text:"Did your marital status change during the year?" },
    { id:"p2", text:"Did your name change during the tax year?" },
    { id:"p3", text:"If filing married separately, did you and your spouse live apart for the last six months of 2025?" },
    { id:"p4", text:"Can you or your spouse be claimed as a dependent by someone else?" },
    { id:"p5", text:"Did your address change during the year?" },
    { id:"p6", text:"Were you, your spouse, or any dependents a victim of identity theft?" },
    { id:"p7", text:"Were you, your spouse, or any dependents issued an Identity Protection PIN (IP PIN)?", note:"If yes, provide Notice CP01A from the IRS." },
  ]},
  { title: "Dependent information", questions: [
    { id:"d1", text:"Did you have any changes in dependents during the year?" },
    { id:"d2", text:"Can another person qualify to claim any of your dependents?" },
    { id:"d3", text:"Did you have any child or dependent care expenses during the year?" },
    { id:"d4", text:"Did you have any adoption expenses during the year?" },
    { id:"d5", text:"Did you have any children under age 18 or a full-time student under age 24 with more than $2,700 of unearned income?" },
  ]},
  { title: "Health care information", questions: [
    { id:"h1", text:"Did any member of your household have healthcare coverage through the Marketplace (Obamacare)?", note:"If yes, provide Form 1095-A." },
    { id:"h2", text:"Did you receive any distributions from a Health Savings Account (HSA), Archer MSA, or Medicare Advantage MSA during the year?" },
  ]},
  { title: "Income, purchases, sales & debt", questions: [
    { id:"i1", text:"Did you receive any tips not reported to your employer?" },
    { id:"i2", text:"Did you receive any disability income during the year?" },
    { id:"i3", text:"Did you cash in any U.S. savings bonds during the year?" },
    { id:"i4", text:"Did you start a new business or purchase any rental property during the year?" },
    { id:"i5", text:"Did you sell an existing business, rental property, or other property during the year?" },
    { id:"i6", text:"Did you purchase any business assets or convert any assets to business use?" },
    { id:"i7", text:"Did you purchase any gasoline, diesel, or special fuels for off-road business use?" },
    { id:"i8", text:"Did you buy or sell any stocks, bonds, or other investments during the year?" },
    { id:"i9", text:"Did you sell a principal residence during the year?" },
    { id:"i10", text:"Did you have a principal residence or real property foreclosed on during the year?" },
    { id:"i11", text:"Did you abandon a principal residence or a piece of real property during the year?" },
    { id:"i12", text:"Did you refinance your home or take out a home equity loan during the year?" },
    { id:"i13", text:"Did you receive any principal or interest from property sold in prior years?" },
    { id:"i14", text:"Did you rent out your home or use it for business?" },
    { id:"i15", text:"Did you sell, exchange, or purchase any real estate during the year?" },
    { id:"i16", text:"Did you acquire a new or additional interest in a partnership or S corporation?" },
    { id:"i17", text:"Did you have any debts canceled or forgiven this year?" },
    { id:"i18", text:"Does anyone owe you money that has become uncollectible?" },
    { id:"i19", text:"Did you purchase a new or previously owned clean vehicle (EV, plug-in hybrid, fuel-cell) during the year?" },
    { id:"i20", text:"Did you receive income or incur expenses associated with a fantasy sports league?" },
    { id:"i21", text:"Did you receive income or incur expenses associated with car sharing (e.g., Lyft or Uber)?" },
    { id:"i22", text:"Did you receive income or incur expenses associated with freelancing (e.g., Upwork or TaskRabbit)?" },
    { id:"i23", text:"Did you receive income or incur expenses associated with fashion sharing (e.g., Poshmark or thredUP)?" },
    { id:"i24", text:"Did you receive income or incur expenses associated with crowdfunding (e.g., Kickstarter or Indiegogo)?" },
    { id:"i25", text:"Did you receive income or incur expenses associated with a short-term rental (e.g., Airbnb, VRBO)?" },
    { id:"i26", text:"Did you receive income or incur expenses as an independent contractor (e.g., Shipt, Instacart, DoorDash)?" },
    { id:"i27", text:"Did you receive any other income not provided with this organizer?" },
  ]},
  { title: "Itemized deduction information", questions: [
    { id:"id1", text:"Did you pay out-of-pocket medical or dental expenses during the year?" },
    { id:"id2", text:"Did you pay any long-term care premiums for yourself, your spouse, or a dependent?" },
    { id:"id3", text:"Did you receive any state or local income tax refunds from prior years?" },
    { id:"id4", text:"Did you make any major purchases (vehicle, boat, etc.) during the year?" },
    { id:"id5", text:"Did you pay any real estate property taxes or personal taxes during the year?" },
    { id:"id6", text:"Did you pay mortgage interest during the year?" },
    { id:"id7", text:"Did you make cash donations to charity during the year?" },
    { id:"id8", text:"Did you make noncash donations to charity (clothes, furniture, etc.) during the year?" },
    { id:"id9", text:"Did you donate a boat or vehicle during the year?", note:"If yes, attach Form 1098-C." },
    { id:"id10", text:"Did you have gambling winnings or losses during the year?" },
    { id:"id11", text:"Did you have any unreimbursed job-related expenses (uniforms, safety equipment, etc.)?" },
    { id:"id12", text:"Did you use your vehicle on the job other than for commuting?" },
    { id:"id13", text:"Did you work out of town at any time during the year?" },
  ]},
  { title: "Retirement information", questions: [
    { id:"r1", text:"Did you make any contributions to an IRA, Roth, Keogh, SIMPLE, SEP, 401(k), or other qualified retirement plan?" },
    { id:"r2", text:"Did you make any withdrawals or receive distributions from a pension, IRA, Roth, 401(k), or other qualified retirement plan?" },
    { id:"r3", text:"Did you execute any rollovers from an IRA, Roth, Keogh, SIMPLE, SEP, 401(k), or other qualified retirement plan?" },
    { id:"r4", text:"Did you receive any Social Security benefits during the year?" },
  ]},
  { title: "Education information", questions: [
    { id:"e1", text:"Did you pay tuition required for attending college, university, or vocational school for yourself, your spouse, or a dependent?" },
    { id:"e2", text:"Did anyone in your household attend a post-secondary school during the year?" },
    { id:"e3", text:"Did you make a contribution to or receive a distribution from an Education Savings Account or Qualified Tuition Program?" },
    { id:"e4", text:"Did you pay student loan interest for yourself, your spouse, or your dependents?" },
    { id:"e5", text:"Did you receive forgiveness on a qualifying federal student loan?" },
  ]},
  { title: "Foreign tax information", questions: [
    { id:"f1", text:"Did you have a financial interest in or signature authority over a financial account or asset in a foreign country?" },
    { id:"f2", text:"Did you receive a distribution from, or were you a grantor of, or transferor to, a foreign trust?" },
    { id:"f3", text:"Did the aggregate value of your foreign accounts exceed $10,000 at any time during the year?" },
    { id:"f4", text:"Did you have any income from, or pay taxes to, a foreign country?" },
    { id:"f5", text:"Did you receive a Schedule K-3 from a partnership or S corporation?" },
    { id:"f6", text:"Did you have ownership in a foreign corporation at any time during the year?" },
    { id:"f7", text:"Did you own property in a foreign country?" },
  ]},
  { title: "Refund, withholding & estimated tax", questions: [
    { id:"rt1", text:"If you have an overpayment of 2025 taxes, do you want the refund applied to your 2026 estimated taxes?" },
    { id:"rt2", text:"Did you make any estimated payments toward your 2025 taxes?" },
    { id:"rt3", text:"Did you apply an overpayment of your 2024 taxes to your 2025 estimated taxes?" },
    { id:"rt4", text:"Do you want any refund or balance due directly deposited or withdrawn?", note:"Due to Executive Order 14247, refunds by check will be delayed at least 6 weeks. Direct deposit strongly recommended." },
    { id:"rt5", text:"Do you anticipate your income or withholdings to be different for 2026?" },
  ]},
  { title: "One Big Beautiful Bill implications", questions: [
    { id:"bb1", text:"Did you receive qualified tips reported on Form W-2 or a statement from your employer?" },
    { id:"bb2", text:"Did you receive overtime pay reported on Form W-2 or a statement from your employer?" },
    { id:"bb3", text:"Did you purchase a new passenger vehicle for personal use during 2025?" },
    { id:"bb3a", text:"Was the final assembly in the U.S.?", sub: true },
    { id:"bb3b", text:"Is the gross vehicle weight under 14,000 pounds?", sub: true },
    { id:"bb3c", text:"Was the vehicle not purchased with a lease?", sub: true },
    { id:"bb3d", text:"Was the vehicle used to secure the loan?", sub: true },
    { id:"bb4", text:"If you have a dependent born during 2025, do you want to establish a Trump Account?" },
    { id:"bb4a", text:"Do you want to receive a $1,000 pilot program contribution?", sub: true },
  ]},
  { title: "Miscellaneous information", questions: [
    { id:"m1", text:"Did you receive, sell, exchange, gift, or otherwise dispose of any digital asset or financial interest in any digital asset?" },
    { id:"m2", text:"Did you incur a gain or loss due to damaged or stolen property while living in a federally declared disaster area?" },
    { id:"m3", text:"Did you pay wages to any household employees (babysitter, nanny, housekeeper, etc.)?" },
    { id:"m4", text:"Did you make gifts to any one person in excess of $19,000 during the year?" },
    { id:"m4a", text:"If yes, are you splitting the gift with your spouse?", sub: true },
    { id:"m5", text:"Did you incur moving expenses with the military during the year?" },
    { id:"m6", text:"Did you make any energy-efficient improvements to your main home during the year?" },
    { id:"m7", text:"Are you a business owner who paid health insurance premiums for your employees during the year?" },
    { id:"m8", text:"Did you receive a cash payment or digital asset of more than $10,000 in one transaction or related transactions?" },
    { id:"m8a", text:"If yes, was Form 8300 filed?", sub: true },
    { id:"m9", text:"Do you own interest or shares in or did you dispose of a Qualified Opportunity Fund during the year?" },
    { id:"m10", text:"Did you make any purchases subject to use tax during the year?" },
    { id:"m11", text:"Did you receive any notices from the IRS or state taxing authority?" },
    { id:"m12", text:"May the IRS discuss your tax return with your preparer?" },
    { id:"m13", text:"Would you like a copy of your tax return sent to you electronically instead of printed?" },
  ]},
];

const answers = {};
let totalQ = 0;

function countTotal() {
  let t = 0;
  SECTIONS.forEach(s => s.questions.forEach(() => t++));
  return t;
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  const pct = Math.round((answered / totalQ) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = answered + ' of ' + totalQ + ' answered';
}

function setAnswer(id, val) {
  answers[id] = val;
  const yBtn = document.getElementById('y-' + id);
  const nBtn = document.getElementById('n-' + id);
  yBtn.className = 'yes' + (val === 'Yes' ? ' active' : '');
  nBtn.className = 'no' + (val === 'No' ? ' active' : '');
  updateProgress();
}

function setAllInSection(sectionIndex, val) {
  const section = SECTIONS[sectionIndex];
  section.questions.forEach(q => setAnswer(q.id, val));
  const yAllBtn = document.getElementById('all-yes-' + sectionIndex);
  const nAllBtn = document.getElementById('all-no-' + sectionIndex);
  yAllBtn.className = val === 'Yes' ? 'all-yes' : '';
  nAllBtn.className = val === 'No' ? 'all-no' : '';
}

function buildUI() {
  totalQ = countTotal();
  const container = document.getElementById('questions-container');
  SECTIONS.forEach((section, si) => {
    const sec = document.createElement('div');
    sec.className = 'section';

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML =
      '<div class="section-title">' + section.title + '</div>' +
      '<div class="section-all-btns">' +
      '<span class="section-all-label">All:</span>' +
      '<button id="all-yes-' + si + '" onclick="setAllInSection(' + si + ',\'Yes\')">Yes</button>' +
      '<button id="all-no-' + si + '" onclick="setAllInSection(' + si + ',\'No\')">No</button>' +
      '</div>';
    sec.appendChild(header);

    section.questions.forEach(q => {
      const row = document.createElement('div');
      row.className = 'question' + (q.sub ? ' sub' : '');
      row.innerHTML =
        '<div class="q-text">' + q.text + (q.note ? '<div class="q-note">' + q.note + '</div>' : '') + '</div>' +
        '<div class="yn-btns">' +
        '<button id="y-' + q.id + '" class="yes" onclick="setAnswer(\'' + q.id + '\',\'Yes\')">Yes</button>' +
        '<button id="n-' + q.id + '" class="no" onclick="setAnswer(\'' + q.id + '\',\'No\')">No</button>' +
        '</div>';
      sec.appendChild(row);
    });
    container.appendChild(sec);
  });
  updateProgress();
}

function submitForm() {
  const name = document.getElementById('client-name').value.trim() || 'Client';
  const ssn = document.getElementById('client-ssn').value.trim();
  const answered = Object.keys(answers).length;
  if (answered < Math.ceil(totalQ * 0.5)) {
    alert('Please answer at least half the questions before submitting.');
    return;
  }
  let body = '2025 Tax Questionnaire\n';
  body += 'Name: ' + name + '\n';
  if (ssn) body += 'SSN (last 4): ' + ssn + '\n';
  body += '\n';
  SECTIONS.forEach(section => {
    body += '--- ' + section.title.toUpperCase() + ' ---\n';
    section.questions.forEach(q => {
      const ans = answers[q.id] || '(no answer)';
      body += (q.sub ? '  > ' : '') + q.text + '\n    ' + ans + '\n';
    });
    body += '\n';
  });
  const subject = encodeURIComponent('2025 Tax Questionnaire – ' + name);
  const bodyEnc = encodeURIComponent(body);
  window.location.href = 'mailto:tcna@tcna3.com?subject=' + subject + '&body=' + bodyEnc;
}

buildUI();
</script>
</body>
</html>
